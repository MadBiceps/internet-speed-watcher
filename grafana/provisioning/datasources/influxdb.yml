apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: my-org
      defaultBucket: speedtest
    secureJsonData:
      token: my-super-secret-token
    isDefault: true
    editable: true
